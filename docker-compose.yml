version: '3.8'

services:
  dtcomb-api:
    build: .
    container_name: dtcomb_app
    ports:
      - "${PORT:-3838}:3838"
    volumes:
      - .:/app
      - ./data:/app/data  # SQLite veritabanı burada saklanacak
      - ./logs:/app/logs  # Log dosyaları burada saklanacak
    env_file:
      - .env
    environment:
      - R_HOME=/usr/lib/R
      - LD_LIBRARY_PATH=/usr/lib/R/lib:/usr/lib/x86_64-linux-gnu
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3838/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
