[supervisord]
nodaemon=true

[program:redis]
command=/usr/bin/redis-server
autostart=true
autorestart=true
stderr_logfile=/var/log/redis.err.log
stderr_logfile_maxbytes=5MB
stdout_logfile=/dev/null
stdout_logfile_maxbytes=0
stderr_logfile_backups=2

[program:uvicorn]
command=python3.13 -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=2

[program:celery]
command=celery -A app.celery_worker.celery worker --loglevel=error --concurrency=2
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=2

