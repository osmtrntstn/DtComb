{% extends "layout.html" %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 80vh; background: #f8f9fa;">
    <div class="text-center p-5 shadow-lg rounded-4 bg-white" style="max-width: 600px; border-top: 5px solid #ffc107;">

        <h1 class="display-1 fw-bold text-secondary" style="opacity: 0.2; letter-spacing: -5px;">
            {{ status_code }}
        </h1>

        <div class="mt-n5 position-relative" style="margin-top: -10px !important;">
            <div class="mb-4">
                <i class="fas {{ icon }} fa-5x text-warning animate__animated animate__bounceIn"></i>
            </div>

            <h2 class="fw-bold text-dark mb-3">{{ title }}</h2>
            <p class="text-muted fs-5 mb-5">
                {{ message }}
            </p>

            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                <a href="/" class="btn btn-dark btn-lg px-4 rounded-pill shadow">
                    <i class="fas fa-home me-2"></i> Ana Sayfa
                </a>
                <button onclick="window.history.back()" class="btn btn-outline-secondary btn-lg px-4 rounded-pill">
                    <i class="fas fa-arrow-left me-2"></i> Geri Dön
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    /* Küçük bir animasyon dokunuşu */
    .animate__bounceIn {
        animation: bounceIn 1s;
    }
    @keyframes bounceIn {
        from, 20%, 40%, 60%, 80%, to { animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1); }
        0% { opacity: 0; transform: scale3d(0.3, 0.3, 0.3); }
        20% { transform: scale3d(1.1, 1.1, 1.1); }
        40% { transform: scale3d(0.9, 0.9, 0.9); }
        60% { opacity: 1; transform: scale3d(1.03, 1.03, 1.03); }
        80% { transform: scale3d(0.97, 0.97, 0.97); }
        to { opacity: 1; transform: scale3d(1, 1, 1); }
    }
</style>
{% endblock %}
