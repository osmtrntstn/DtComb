<!DOCTYPE html>
<!--
This is a starter template page. Use this page to start your new project from
scratch. This page gets rid of all links and provides the needed markup only.
-->
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}DtComb App{% endblock %}</title>
    <link rel="icon" href="/static/img/favicon.png" type="image/x-icon"/>
    <!-- Google Font: Source Sans Pro -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="/static/plugins/fontawesome-free/css/all.min.css">
    <!-- iCheck for checkboxes and radio inputs -->
    <link rel="stylesheet" href="/static/plugins/icheck-bootstrap/icheck-bootstrap.min.css">
    <!-- Datatables -->
    <link rel="stylesheet" href="/static/plugins/datatables/datatables.min.css">
    <!-- Select2 -->
    <link rel="stylesheet" href="/static/plugins/select2/css/select2.min.css">
    <link rel="stylesheet" href="/static/plugins/select2-bootstrap4-theme/select2-bootstrap4.min.css">

    <!-- Theme style -->
    <link rel="stylesheet" href="/static/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="/static//css/style.css">
    {% block head %}{% endblock %}
</head>
<body class="hold-transition layout-top-nav layout-navbar-fixed layout-footer-fixed">
<div class="wrapper">

    <!-- Navbar -->
    <nav class="main-header navbar navbar-expand-md navbar-light navbar-dark">
        <div class="container-fluid">
            <a href="/" class="navbar-brand">
                <img src="/static/img/nav-bar.png" alt="DtComb Logo"
                     class="brand-image img-circle elevation-3" style="opacity: .8">
                <span class="brand-text font-weight-light">dtComb: Combining Two Diagnostic Tests</span>
            </a>

            <button class="navbar-toggler order-1" type="button" data-toggle="collapse" data-target="#navbarCollapse"
                    aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse order-3" id="navbarCollapse">
                <!-- Left navbar links -->
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">About</a>
                    </li>
                    <li class="nav-item">
                        <a href="/data-upload"
                           class="nav-link {% if request.url.path == '/data-upload' %}active{% endif %}">Data Upload</a>
                    </li>
                    <li class="nav-item">
                        <a href="/analysis2"
                           class="nav-link {% if request.url.path == '/analysis' %}active{% endif %}">Analysis</a>
                    </li>
                    <li class="nav-item hide">
                        <a href="/roc-analysis"
                           class="nav-link {% if request.url.path == '/roc-analysis' %}active{% endif %}">Roc</a>
                    </li>
                    <li class="nav-item">
                        <a href="/predict"
                           class="nav-link {% if request.url.path == '/predict' %}active{% endif %}">Predict</a>
                    </li>
                    <li class="nav-item">
                        <a href="/manual"
                           class="nav-link {% if request.url.path == '/manual' %}active{% endif %}">Manual</a>
                    </li>
                </ul>

            </div>

            <!-- Right navbar links -->
            <ul class="order-1 order-md-3 navbar-nav navbar-no-expand ml-auto">

                <li class="nav-item">
                    <a class="nav-link" data-widget="control-sidebar" data-slide="true" href="#" role="button">
                        <i class="fas fa-th-large"></i>
                    </a>
                </li>
            </ul>
        </div>
    </nav>
    <!-- /.navbar -->

    <!-- Content Wrapper. Contains page content -->
    <div class="content-wrapper pt-3">

        <!-- Main content -->
        <div class="content ">
            <div class="container-fluid">
                <div class="row">
                    {% block content %}{% endblock %}
                </div>
                <!-- /.row -->
            </div><!-- /.container-fluid -->
        </div>
        <!-- /.content -->
    </div>
    <!-- /.content-wrapper -->

    <!-- Control Sidebar -->
    <aside class="control-sidebar control-sidebar-dark">
        <!-- Control sidebar content goes here -->
    </aside>
    <!-- /.control-sidebar -->

    <!-- Main Footer -->
    <footer class="main-footer">
        <!-- To the right -->
        <div class="float-right d-none d-sm-inline">
            Anything you want
        </div>
        <!-- Default to the left -->
        <strong>Copyright &copy; 2014-2021 <a href="https://adminlte.io">AdminLTE.io</a>.</strong> All rights reserved.
    </footer>
</div>
<!-- ./wrapper -->

<!-- REQUIRED SCRIPTS -->

<!-- jQuery -->
<script src="/static/plugins/jquery/jquery.min.js"></script>
<!-- Bootstrap 4 -->
<script src="/static/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<!-- Datatables -->
<script src="/static/plugins/datatables/datatables.min.js"></script>
<!-- Select2 -->
<script src="/static/plugins/select2/js/select2.full.min.js"></script>
<!-- SweetAlert2 -->
<script src="/static/plugins/sweetalert2/sweetalert.min.js"></script>

<!-- AdminLTE App -->
<script src="/static/dist/js/adminlte.min.js"></script>

<script src="{{ url_for('static', path='/js/main.js') }}"></script>
{% block scripts %}{% endblock %}

</body>
</html>
